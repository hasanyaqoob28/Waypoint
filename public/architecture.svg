<svg viewBox="0 0 1400 1200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <polygon points="0 0, 10 3, 0 6" fill="#333"/>
    </marker>
  </defs>
  
  <rect width="1400" height="1200" fill="#f5f5f5"/>
  
  <!-- Title -->
  <text x="700" y="40" font-size="32" font-weight="bold" text-anchor="middle" fill="#1a1a1a">Travelway - AWS Well-Architected Architecture</text>
  
  <!-- Six Pillars Section -->
  <text x="700" y="80" font-size="14" font-weight="bold" text-anchor="middle" fill="#666">AWS Well-Architected Six Pillars</text>
  
  <!-- Pillar 1: Operational Excellence -->
  <rect x="40" y="95" width="180" height="50" fill="#FF9900" rx="5"/>
  <text x="130" y="115" font-size="12" font-weight="bold" text-anchor="middle" fill="#fff">Operational Excellence</text>
  <text x="130" y="135" font-size="10" text-anchor="middle" fill="#fff">Monitoring, Automation</text>
  
  <!-- Pillar 2: Security -->
  <rect x="240" y="95" width="180" height="50" fill="#EC7211" rx="5"/>
  <text x="330" y="115" font-size="12" font-weight="bold" text-anchor="middle" fill="#fff">Security</text>
  <text x="330" y="135" font-size="10" text-anchor="middle" fill="#fff">Encryption, IAM Auth</text>
  
  <!-- Pillar 3: Reliability -->
  <rect x="440" y="95" width="180" height="50" fill="#146EB4" rx="5"/>
  <text x="530" y="115" font-size="12" font-weight="bold" text-anchor="middle" fill="#fff">Reliability</text>
  <text x="530" y="135" font-size="10" text-anchor="middle" fill="#fff">Multi-AZ, Failover</text>
  
  <!-- Pillar 4: Performance -->
  <rect x="640" y="95" width="180" height="50" fill="#FF9900" rx="5"/>
  <text x="730" y="115" font-size="12" font-weight="bold" text-anchor="middle" fill="#fff">Performance</text>
  <text x="730" y="135" font-size="10" text-anchor="middle" fill="#fff">Serverless, Caching</text>
  
  <!-- Pillar 5: Cost Optimization -->
  <rect x="840" y="95" width="180" height="50" fill="#EC7211" rx="5"/>
  <text x="930" y="115" font-size="12" font-weight="bold" text-anchor="middle" fill="#fff">Cost Optimization</text>
  <text x="930" y="135" font-size="10" text-anchor="middle" fill="#fff">Pay-per-use, Indexed</text>
  
  <!-- Pillar 6: Sustainability -->
  <rect x="1040" y="95" width="180" height="50" fill="#146EB4" rx="5"/>
  <text x="1130" y="115" font-size="12" font-weight="bold" text-anchor="middle" fill="#fff">Sustainability</text>
  <text x="1130" y="135" font-size="10" text-anchor="middle" fill="#fff">Efficient, Green</text>
  
  <!-- ========== MAIN ARCHITECTURE ========== -->
  
  <!-- LAYER 1: CLIENT -->
  <text x="700" y="190" font-size="14" font-weight="bold" text-anchor="middle" fill="#666">LAYER 1: USER CLIENT</text>
  <rect x="500" y="210" width="400" height="70" fill="#E3F2FD" stroke="#1976D2" stroke-width="2" rx="5"/>
  <text x="700" y="235" font-size="14" font-weight="bold" text-anchor="middle" fill="#1976D2">User Browser</text>
  <text x="700" y="255" font-size="11" text-anchor="middle" fill="#424242">User pastes booking confirmation email</text>
  <text x="700" y="270" font-size="10" text-anchor="middle" fill="#555">Request flows down</text>
  
  <path d="M 700 280 L 700 320" stroke="#333" stroke-width="2" marker-end="url(#arrowhead)"/>
  <circle cx="700" cy="300" r="15" fill="#FF6B6B"/>
  <text x="700" y="305" font-size="12" font-weight="bold" text-anchor="middle" fill="#fff">1</text>
  
  <!-- LAYER 2: FRONTEND (VERCEL) -->
  <text x="700" y="340" font-size="14" font-weight="bold" text-anchor="middle" fill="#666">LAYER 2: FRONTEND (Vercel Next.js)</text>
  
  <rect x="300" y="360" width="350" height="100" fill="#F3E5F5" stroke="#7B1FA2" stroke-width="2" rx="5"/>
  <text x="475" y="385" font-size="12" font-weight="bold" fill="#7B1FA2">Vercel Frontend Application</text>
  <text x="475" y="403" font-size="10" fill="#333">Input Form Component</text>
  <text x="475" y="418" font-size="10" fill="#333">Event Timeline Display</text>
  <text x="475" y="433" font-size="10" fill="#333">Context Guidance Panel</text>
  <text x="475" y="448" font-size="10" fill="#333">Weather Widget Integration</text>
  
  <rect x="700" y="360" width="350" height="100" fill="#FFF3E0" stroke="#E65100" stroke-width="2" rx="5"/>
  <text x="875" y="385" font-size="12" font-weight="bold" fill="#E65100">External: Open-Meteo</text>
  <text x="875" y="403" font-size="10" fill="#333">Weather API (Real-time Data)</text>
  <text x="875" y="418" font-size="10" fill="#333">Get destination weather</text>
  <text x="875" y="433" font-size="10" fill="#333">Return to UI for display</text>
  <text x="875" y="448" font-size="10" fill="#333">No auth required</text>
  
  <!-- Arrow from Frontend to Backend -->
  <path d="M 700 460 L 700 500" stroke="#333" stroke-width="2" marker-end="url(#arrowhead)"/>
  <circle cx="700" cy="480" r="15" fill="#FF6B6B"/>
  <text x="700" y="485" font-size="12" font-weight="bold" text-anchor="middle" fill="#fff">2</text>
  
  <!-- LAYER 3: BACKEND and AI PROCESSING -->
  <text x="700" y="525" font-size="14" font-weight="bold" text-anchor="middle" fill="#666">LAYER 3: BACKEND (Next.js Serverless) AND AI</text>
  
  <rect x="200" y="545" width="400" height="110" fill="#E8F5E9" stroke="#2E7D32" stroke-width="2" rx="5"/>
  <text x="400" y="570" font-size="12" font-weight="bold" fill="#2E7D32">Next.js API Routes (Serverless)</text>
  <text x="400" y="590" font-size="10" fill="#333">POST /api/parse</text>
  <text x="400" y="605" font-size="10" fill="#333">Receives raw booking text</text>
  <text x="400" y="620" font-size="10" fill="#333">GET /api/trips</text>
  <text x="400" y="635" font-size="10" fill="#333">Retrieves trips from database</text>
  
  <rect x="650" y="545" width="400" height="110" fill="#F3E5F5" stroke="#7B1FA2" stroke-width="2" rx="5"/>
  <text x="850" y="570" font-size="12" font-weight="bold" fill="#7B1FA2">Google Gemini AI (Vercel AI SDK)</text>
  <text x="850" y="590" font-size="10" fill="#333">Parses messy booking text</text>
  <text x="850" y="605" font-size="10" fill="#333">Extracts: flight numbers, times,</text>
  <text x="850" y="620" font-size="10" fill="#333">gates, hotel names, addresses</text>
  <text x="850" y="635" font-size="10" fill="#333">Returns structured JSON data</text>
  
  <!-- Bidirectional arrow between API and AI -->
  <path d="M 600 600 L 650 600" stroke="#333" stroke-width="2" marker-end="url(#arrowhead)"/>
  <path d="M 650 590 L 600 590" stroke="#333" stroke-width="2" marker-end="url(#arrowhead)"/>
  
  <!-- Arrow from Backend to Database -->
  <path d="M 700 655 L 700 695" stroke="#333" stroke-width="2" marker-end="url(#arrowhead)"/>
  <circle cx="700" cy="675" r="15" fill="#FF6B6B"/>
  <text x="700" y="680" font-size="12" font-weight="bold" text-anchor="middle" fill="#fff">3</text>
  
  <!-- LAYER 4: DATABASE (Aurora PostgreSQL) -->
  <text x="700" y="720" font-size="14" font-weight="bold" text-anchor="middle" fill="#666">LAYER 4: PRIMARY DATA STORAGE (AWS Aurora PostgreSQL)</text>
  
  <rect x="250" y="740" width="900" height="180" fill="#E0F2F1" stroke="#00695C" stroke-width="3" rx="5"/>
  
  <text x="700" y="765" font-size="13" font-weight="bold" text-anchor="middle" fill="#00695C">Aurora PostgreSQL Database (Multi-AZ, Encrypted, IAM Auth)</text>
  
  <!-- Table 1: USERS -->
  <rect x="270" y="780" width="260" height="120" fill="#B2DFDB" stroke="#00695C" stroke-width="1" rx="3"/>
  <text x="400" y="800" font-size="11" font-weight="bold" text-anchor="middle" fill="#00695C">USERS Table</text>
  <text x="400" y="820" font-size="9" text-anchor="middle" fill="#333">user_id (Primary Key)</text>
  <text x="400" y="835" font-size="9" text-anchor="middle" fill="#333">email (Unique)</text>
  <text x="400" y="850" font-size="9" text-anchor="middle" fill="#333">password_hash</text>
  <text x="400" y="865" font-size="9" text-anchor="middle" fill="#333">created_at</text>
  <text x="400" y="880" font-size="9" text-anchor="middle" fill="#333">updated_at</text>
  
  <!-- Table 2: TRIPS -->
  <rect x="570" y="780" width="260" height="120" fill="#B2DFDB" stroke="#00695C" stroke-width="1" rx="3"/>
  <text x="700" y="800" font-size="11" font-weight="bold" text-anchor="middle" fill="#00695C">TRIPS Table</text>
  <text x="700" y="820" font-size="9" text-anchor="middle" fill="#333">trip_id (Primary Key)</text>
  <text x="700" y="835" font-size="9" text-anchor="middle" fill="#333">user_id (Foreign Key)</text>
  <text x="700" y="850" font-size="9" text-anchor="middle" fill="#333">destination</text>
  <text x="700" y="865" font-size="9" text-anchor="middle" fill="#333">title</text>
  <text x="700" y="880" font-size="9" text-anchor="middle" fill="#333">raw_booking_text</text>
  
  <!-- Table 3: EVENTS -->
  <rect x="870" y="780" width="260" height="120" fill="#B2DFDB" stroke="#00695C" stroke-width="1" rx="3"/>
  <text x="1000" y="800" font-size="11" font-weight="bold" text-anchor="middle" fill="#00695C">EVENTS Table</text>
  <text x="1000" y="820" font-size="9" text-anchor="middle" fill="#333">event_id (Primary Key)</text>
  <text x="1000" y="835" font-size="9" text-anchor="middle" fill="#333">trip_id (Foreign Key)</text>
  <text x="1000" y="850" font-size="9" text-anchor="middle" fill="#333">type, flight_number, time</text>
  <text x="1000" y="865" font-size="9" text-anchor="middle" fill="#333">hotel_name, address</text>
  <text x="1000" y="880" font-size="9" text-anchor="middle" fill="#333">activity_name, location</text>
  
  <!-- Arrow from Database back to Frontend (for retrieval and display) -->
  <path d="M 700 920 L 700 960 L 200 960 L 200 460 L 300 460" stroke="#2E7D32" stroke-width="2" marker-end="url(#arrowhead)" stroke-dasharray="5,5"/>
  <circle cx="700" cy="940" r="15" fill="#4CAF50"/>
  <text x="700" y="945" font-size="12" font-weight="bold" text-anchor="middle" fill="#fff">4</text>
  
  <text x="150" y="710" font-size="10" font-style="italic" fill="#555">Data returned to UI</text>
  
  <!-- Bottom Legend -->
  <text x="700" y="1010" font-size="12" font-weight="bold" text-anchor="middle" fill="#333">Complete Data Flow</text>
  <text x="700" y="1030" font-size="10" text-anchor="middle" fill="#555">User Input (1) → API Routes + Gemini Parsing (2) → Parse and Store in Aurora (3) → Retrieve and Display (4) with Weather Data</text>
  <text x="700" y="1050" font-size="10" text-anchor="middle" fill="#555">Database: Primary backend storage with encryption, multi-AZ failover, automatic backups, and IAM authentication</text>
  
</svg>
