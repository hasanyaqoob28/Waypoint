<svg viewBox="0 0 1400 1000" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="1400" height="1000" fill="#f8f9fa"/>
  
  <!-- Title -->
  <text x="700" y="30" font-size="32" font-weight="bold" text-anchor="middle" fill="#1a1a1a">
    Travelway - AWS Well-Architected Architecture
  </text>
  
  <!-- Six Pillars Labels (Top) -->
  <g font-size="12" font-weight="bold" fill="#ffffff" text-anchor="middle">
    <!-- Operational Excellence -->
    <rect x="50" y="50" width="160" height="40" fill="#FF9900" rx="5"/>
    <text x="130" y="75">Operational Excellence</text>
    
    <!-- Security -->
    <rect x="220" y="50" width="160" height="40" fill="#EC7211" rx="5"/>
    <text x="300" y="75">Security</text>
    
    <!-- Reliability -->
    <rect x="390" y="50" width="160" height="40" fill="#146EB4" rx="5"/>
    <text x="470" y="75">Reliability</text>
    
    <!-- Performance -->
    <rect x="560" y="50" width="160" height="40" fill="#FF9900" rx="5"/>
    <text x="640" y="75">Performance</text>
    
    <!-- Cost Optimization -->
    <rect x="730" y="50" width="160" height="40" fill="#EC7211" rx="5"/>
    <text x="810" y="75">Cost Optimized</text>
    
    <!-- Sustainability -->
    <rect x="900" y="50" width="160" height="40" fill="#146EB4" rx="5"/>
    <text x="980" y="75">Sustainability</text>
  </g>
  
  <!-- Main Architecture Diagram -->
  
  <!-- LAYER 1: CLIENT -->
  <g>
    <text x="700" y="140" font-size="14" font-weight="bold" text-anchor="middle" fill="#666">CLIENT LAYER</text>
    <rect x="550" y="155" width="300" height="60" fill="#E3F2FD" stroke="#1976D2" stroke-width="2" rx="5"/>
    <text x="700" y="190" font-size="16" font-weight="bold" text-anchor="middle" fill="#1976D2">User Browser</text>
    <text x="700" y="210" font-size="11" text-anchor="middle" fill="#424242">Paste Booking Confirmation Email</text>
  </g>
  
  <!-- Arrow Down -->
  <path d="M 700 215 L 700 260" stroke="#666" stroke-width="2" marker-end="url(#arrowhead)"/>
  
  <!-- LAYER 2: FRONTEND (VERCEL) -->
  <g>
    <text x="700" y="280" font-size="14" font-weight="bold" text-anchor="middle" fill="#666">FRONTEND LAYER - Vercel</text>
    <rect x="450" y="295" width="500" height="120" fill="#F3E5F5" stroke="#7B1FA2" stroke-width="2" rx="5"/>
    
    <!-- Sub-components -->
    <rect x="470" y="310" width="140" height="50" fill="#E1BEE7" stroke="#7B1FA2" stroke-width="1" rx="3"/>
    <text x="540" y="330" font-size="12" font-weight="bold" text-anchor="middle" fill="#4A148C">Booking Input</text>
    <text x="540" y="345" font-size="10" text-anchor="middle" fill="#4A148C">Form & Parser</text>
    
    <rect x="630" y="310" width="140" height="50" fill="#E1BEE7" stroke="#7B1FA2" stroke-width="1" rx="3"/>
    <text x="700" y="330" font-size="12" font-weight="bold" text-anchor="middle" fill="#4A148C">Event Timeline</text>
    <text x="700" y="345" font-size="10" text-anchor="middle" fill="#4A148C">Live Display</text>
    
    <rect x="790" y="310" width="140" height="50" fill="#E1BEE7" stroke="#7B1FA2" stroke-width="1" rx="3"/>
    <text x="860" y="330" font-size="12" font-weight="bold" text-anchor="middle" fill="#4A148C">Guidance Panel</text>
    <text x="860" y="345" font-size="10" text-anchor="middle" fill="#4A148C">+ Weather</text>
    
    <!-- Tech Stack -->
    <text x="700" y="400" font-size="10" text-anchor="middle" fill="#4A148C">Next.js 16 • React • TypeScript • Tailwind CSS</text>
  </g>
  
  <!-- Arrow Down -->
  <path d="M 700 415 L 700 460" stroke="#666" stroke-width="2" marker-end="url(#arrowhead)"/>
  
  <!-- LAYER 3: API & AI PROCESSING -->
  <g>
    <text x="700" y="480" font-size="14" font-weight="bold" text-anchor="middle" fill="#666">BACKEND & AI PROCESSING</text>
    
    <!-- API Routes -->
    <rect x="450" y="495" width="200" height="100" fill="#C8E6C9" stroke="#388E3C" stroke-width="2" rx="5"/>
    <text x="550" y="520" font-size="12" font-weight="bold" text-anchor="middle" fill="#1B5E20">Next.js API</text>
    <text x="550" y="538" font-size="10" text-anchor="middle" fill="#1B5E20">POST /api/parse</text>
    <text x="550" y="553" font-size="10" text-anchor="middle" fill="#1B5E20">GET /api/trips</text>
    <text x="550" y="568" font-size="9" text-anchor="middle" fill="#1B5E20">Serverless Functions</text>
    
    <!-- Arrow Right -->
    <path d="M 650 545 L 720 545" stroke="#666" stroke-width="2" marker-end="url(#arrowhead)"/>
    
    <!-- Gemini AI -->
    <rect x="720" y="495" width="200" height="100" fill="#FFE0B2" stroke="#F57C00" stroke-width="2" rx="5"/>
    <text x="820" y="520" font-size="12" font-weight="bold" text-anchor="middle" fill="#E65100">Google Gemini AI</text>
    <text x="820" y="538" font-size="10" text-anchor="middle" fill="#E65100">Text Parsing Engine</text>
    <text x="820" y="553" font-size="10" text-anchor="middle" fill="#E65100">Vercel AI SDK</text>
    <text x="820" y="568" font-size="9" text-anchor="middle" fill="#E65100">Extracts structured data</text>
  </g>
  
  <!-- Arrow Down -->
  <path d="M 700 595 L 700 640" stroke="#666" stroke-width="2" marker-end="url(#arrowhead)"/>
  
  <!-- LAYER 4: CORE - AURORA DATABASE -->
  <g>
    <text x="700" y="660" font-size="14" font-weight="bold" text-anchor="middle" fill="#666">DATA LAYER - Aurora PostgreSQL (AWS Primary Backend)</text>
    
    <!-- Main Database Box -->
    <rect x="350" y="675" width="700" height="180" fill="#E8F5E9" stroke="#2E7D32" stroke-width="3" rx="5"/>
    
    <!-- Database Icon/Label -->
    <circle cx="380" cy="720" r="20" fill="#2E7D32"/>
    <text x="380" y="726" font-size="18" font-weight="bold" text-anchor="middle" fill="#fff">🗄</text>
    
    <!-- Three Tables -->
    <!-- USERS Table -->
    <rect x="420" y="690" width="80" height="70" fill="#A5D6A7" stroke="#1B5E20" stroke-width="1" rx="3"/>
    <text x="460" y="705" font-size="11" font-weight="bold" text-anchor="middle" fill="#1B5E20">USERS</text>
    <text x="460" y="720" font-size="9" text-anchor="middle" fill="#1B5E20">user_id</text>
    <text x="460" y="732" font-size="9" text-anchor="middle" fill="#1B5E20">email</text>
    <text x="460" y="744" font-size="9" text-anchor="middle" fill="#1B5E20">password</text>
    <text x="460" y="756" font-size="9" text-anchor="middle" fill="#1B5E20">created_at</text>
    
    <!-- TRIPS Table -->
    <rect x="530" y="690" width="80" height="70" fill="#A5D6A7" stroke="#1B5E20" stroke-width="1" rx="3"/>
    <text x="570" y="705" font-size="11" font-weight="bold" text-anchor="middle" fill="#1B5E20">TRIPS</text>
    <text x="570" y="720" font-size="9" text-anchor="middle" fill="#1B5E20">trip_id</text>
    <text x="570" y="732" font-size="9" text-anchor="middle" fill="#1B5E20">user_id</text>
    <text x="570" y="744" font-size="9" text-anchor="middle" fill="#1B5E20">destination</text>
    <text x="570" y="756" font-size="9" text-anchor="middle" fill="#1B5E20">raw_text</text>
    
    <!-- EVENTS Table -->
    <rect x="640" y="690" width="110" height="70" fill="#A5D6A7" stroke="#1B5E20" stroke-width="1" rx="3"/>
    <text x="695" y="705" font-size="11" font-weight="bold" text-anchor="middle" fill="#1B5E20">EVENTS</text>
    <text x="695" y="720" font-size="8" text-anchor="middle" fill="#1B5E20">event_id, trip_id</text>
    <text x="695" y="732" font-size="8" text-anchor="middle" fill="#1B5E20">flight_number</text>
    <text x="695" y="744" font-size="8" text-anchor="middle" fill="#1B5E20">hotel_name, time</text>
    <text x="695" y="756" font-size="8" text-anchor="middle" fill="#1B5E20">activity, address</text>
    
    <!-- DB Features -->
    <rect x="770" y="690" width="110" height="70" fill="#C8E6C9" stroke="#1B5E20" stroke-width="1" rx="3"/>
    <text x="825" y="705" font-size="10" font-weight="bold" text-anchor="middle" fill="#1B5E20">DB Features</text>
    <text x="825" y="720" font-size="8" text-anchor="middle" fill="#1B5E20">Multi-AZ</text>
    <text x="825" y="732" font-size="8" text-anchor="middle" fill="#1B5E20">Automated Backups</text>
    <text x="825" y="744" font-size="8" text-anchor="middle" fill="#1B5E20">Encryption at Rest</text>
    <text x="825" y="756" font-size="8" text-anchor="middle" fill="#1B5E20">IAM Auth</text>
    
    <!-- Relationships -->
    <path d="M 500 720 L 530 720" stroke="#1B5E20" stroke-width="1" stroke-dasharray="3,3"/>
    <path d="M 610 720 L 640 720" stroke="#1B5E20" stroke-width="1" stroke-dasharray="3,3"/>
    <path d="M 750 720 L 770 720" stroke="#1B5E20" stroke-width="1" stroke-dasharray="3,3"/>
  </g>
  
  <!-- Arrow Up from DB to API -->
  <path d="M 550 640 L 550 595" stroke="#2E7D32" stroke-width="2" marker-end="url(#arrowhead-green)"/>
  <text x="520" y="620" font-size="10" fill="#2E7D32">Data Retrieval</text>
  
  <!-- Arrow Down to DB -->
  <path d="M 820 595 L 750 675" stroke="#F57C00" stroke-width="2" marker-end="url(#arrowhead-orange)"/>
  <text x="800" y="620" font-size="10" fill="#F57C00">Store Parsed Data</text>
  
  <!-- LAYER 5: EXTERNAL SERVICES -->
  <g>
    <text x="700" y="900" font-size="14" font-weight="bold" text-anchor="middle" fill="#666">EXTERNAL SERVICES</text>
    
    <!-- Weather API -->
    <rect x="550" y="915" width="300" height="60" fill="#FFF3E0" stroke="#E65100" stroke-width="2" rx="5"/>
    <text x="700" y="940" font-size="12" font-weight="bold" text-anchor="middle" fill="#E65100">Open-Meteo Weather API</text>
    <text x="700" y="960" font-size="10" text-anchor="middle" fill="#E65100">Real-time destination weather data</text>
    
    <!-- Arrow to Frontend -->
    <path d="M 700 915 L 700 415" stroke="#E65100" stroke-width="2" stroke-dasharray="5,5" marker-end="url(#arrowhead-orange)"/>
    <text x="750" y="550" font-size="10" fill="#E65100">Weather</text>
  </g>
  
  <!-- Legend - Pillar Mapping -->
  <g font-size="9" fill="#666">
    <text x="50" y="980" font-weight="bold">Pillars Implementation:</text>
    <text x="50" y="995">• Operational Excellence: Serverless auto-scaling, automated deployments • Security: Encryption, IAM, input validation</text>
    <text x="50" y="1005">• Reliability: Multi-AZ failover, backups • Performance: Indexed queries, optimized API • Cost: Pay-per-use • Sustainability: Efficient code</text>
  </g>
  
  <!-- Data Flow Numbers -->
  <g font-size="11" font-weight="bold" fill="#FF6B6B">
    <circle cx="700" cy="225" r="12" fill="#FF6B6B"/>
    <text x="700" y="230" text-anchor="middle" fill="white">1</text>
    
    <circle cx="700" cy="455" r="12" fill="#FF6B6B"/>
    <text x="700" y="460" text-anchor="middle" fill="white">2</text>
    
    <circle cx="700" cy="640" r="12" fill="#FF6B6B"/>
    <text x="700" y="645" text-anchor="middle" fill="white">3</text>
  </g>
  
  <!-- Arrow marker definitions -->
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <polygon points="0 0, 10 3, 0 6" fill="#666"/>
    </marker>
    <marker id="arrowhead-green" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <polygon points="0 0, 10 3, 0 6" fill="#2E7D32"/>
    </marker>
    <marker id="arrowhead-orange" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <polygon points="0 0, 10 3, 0 6" fill="#F57C00"/>
    </marker>
  </defs>
</svg>
