<svg viewBox="0 0 1200 600" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="1200" height="600" fill="#0f172a"/>
  
  <!-- Title -->
  <text x="600" y="30" fontSize="24" fontWeight="bold" fill="#ffffff" textAnchor="middle">Travelway Architecture</text>
  
  <!-- Boxes -->
  <!-- User -->
  <rect x="20" y="60" width="100" height="60" fill="#1e293b" stroke="#ff6b35" strokeWidth="2" rx="5"/>
  <text x="70" y="95" fontSize="14" fontWeight="bold" fill="#ffffff" textAnchor="middle">User</text>
  
  <!-- Frontend Browser -->
  <rect x="180" y="50" width="140" height="80" fill="#1e293b" stroke="#ff6b35" strokeWidth="2" rx="5"/>
  <text x="250" y="80" fontSize="12" fontWeight="bold" fill="#ff6b35" textAnchor="middle">Next.js Frontend</text>
  <text x="250" y="100" fontSize="11" fill="#94a3b8" textAnchor="middle">(React, Tailwind)</text>
  <text x="250" y="115" fontSize="11" fill="#94a3b8" textAnchor="middle">Vercel Deployment</text>
  
  <!-- Vercel Backend -->
  <rect x="400" y="80" width="140" height="80" fill="#1e293b" stroke="#ff6b35" strokeWidth="2" rx="5"/>
  <text x="470" y="110" fontSize="12" fontWeight="bold" fill="#ff6b35" textAnchor="middle">Vercel Backend</text>
  <text x="470" y="130" fontSize="11" fill="#94a3b8" textAnchor="middle">Server Actions</text>
  <text x="470" y="148" fontSize="11" fill="#94a3b8" textAnchor="middle">API Routes</text>
  
  <!-- Google Gemini -->
  <rect x="650" y="80" width="140" height="80" fill="#1e293b" stroke="#ff6b35" strokeWidth="2" rx="5"/>
  <text x="720" y="110" fontSize="12" fontWeight="bold" fill="#ff6b35" textAnchor="middle">Google Gemini</text>
  <text x="720" y="130" fontSize="11" fill="#94a3b8" textAnchor="middle">AI Email Parser</text>
  <text x="720" y="148" fontSize="11" fill="#94a3b8" textAnchor="middle">Data Extraction</text>
  
  <!-- Aurora Database -->
  <rect x="380" y="280" width="180" height="240" fill="#1e293b" stroke="#ff6b35" strokeWidth="2" rx="5"/>
  <text x="470" y="310" fontSize="13" fontWeight="bold" fill="#ff6b35" textAnchor="middle">AWS Aurora PostgreSQL</text>
  <text x="470" y="335" fontSize="11" fill="#94a3b8" textAnchor="middle">Encryption (at rest & in transit)</text>
  <text x="470" y="355" fontSize="11" fill="#94a3b8" textAnchor="middle">IAM Authentication</text>
  
  <!-- Database Tables -->
  <rect x="400" y="375" width="140" height="130" fill="#0f172a" stroke="#64748b" strokeWidth="1" rx="3"/>
  <text x="470" y="395" fontSize="11" fontWeight="bold" fill="#64748b" textAnchor="middle">Database Tables:</text>
  <text x="470" y="415" fontSize="10" fill="#64748b" textAnchor="middle">• USERS</text>
  <text x="470" y="433" fontSize="10" fill="#64748b" textAnchor="middle">• TRIPS</text>
  <text x="470" y="451" fontSize="10" fill="#64748b" textAnchor="middle">• BOOKINGS</text>
  <text x="470" y="469" fontSize="10" fill="#64748b" textAnchor="middle">• EVENTS</text>
  <text x="470" y="487" fontSize="10" fill="#64748b" textAnchor="middle">• RESTAURANTS</text>
  
  <!-- Data Flow Info -->
  <rect x="850" y="50" width="320" height="270" fill="#1e293b" stroke="#64748b" strokeWidth="1" rx="5"/>
  <text x="1010" y="75" fontSize="12" fontWeight="bold" fill="#ff6b35" textAnchor="middle">Complete Data Flow:</text>
  
  <text x="860" y="105" fontSize="11" fontWeight="bold" fill="#94a3b8">1. User Input</text>
  <text x="870" y="122" fontSize="10" fill="#64748b">User pastes travel confirmations</text>
  
  <text x="860" y="150" fontSize="11" fontWeight="bold" fill="#94a3b8">2. Frontend Processing</text>
  <text x="870" y="167" fontSize="10" fill="#64748b">Next.js receives and validates</text>
  
  <text x="860" y="195" fontSize="11" fontWeight="bold" fill="#94a3b8">3. AI Parsing</text>
  <text x="870" y="212" fontSize="10" fill="#64748b">Gemini extracts structured data</text>
  
  <text x="860" y="240" fontSize="11" fontWeight="bold" fill="#94a3b8">4. Data Storage</text>
  <text x="870" y="257" fontSize="10" fill="#64748b">Aurora securely stores all data</text>
  
  <text x="860" y="285" fontSize="11" fontWeight="bold" fill="#94a3b8">5. Display to User</text>
  <text x="870" y="302" fontSize="10" fill="#64748b">Frontend shows organized timeline</text>
  
  <!-- Arrows with markers -->
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <polygon points="0 0, 10 3, 0 6" fill="#ff6b35" />
    </marker>
  </defs>
  
  <!-- User to Browser (Request) -->
  <line x1="120" y1="90" x2="180" y2="90" stroke="#ff6b35" strokeWidth="2" markerEnd="url(#arrowhead)" />
  <text x="145" y="80" fontSize="9" fill="#ff6b35">Paste Email</text>
  
  <!-- Browser to Backend (Request) -->
  <line x1="320" y1="90" x2="400" y2="120" stroke="#ff6b35" strokeWidth="2" markerEnd="url(#arrowhead)" />
  <text x="340" y="105" fontSize="9" fill="#ff6b35">Send Data</text>
  
  <!-- Backend to Gemini (Request) -->
  <line x1="540" y1="120" x2="650" y2="120" stroke="#ff6b35" strokeWidth="2" markerEnd="url(#arrowhead)" />
  <text x="580" y="105" fontSize="9" fill="#ff6b35">Parse Email</text>
  
  <!-- Gemini to Backend (Response) -->
  <line x1="650" y1="140" x2="540" y2="140" stroke="#ff6b35" strokeWidth="2" markerEnd="url(#arrowhead)" />
  <text x="580" y="160" fontSize="9" fill="#ff6b35">Return Data</text>
  
  <!-- Backend to Aurora (Store) -->
  <line x1="470" y1="160" x2="470" y2="280" stroke="#ff6b35" strokeWidth="2" markerEnd="url(#arrowhead)" />
  <text x="480" y="225" fontSize="9" fill="#ff6b35">Store Data</text>
  
  <!-- Aurora to Backend (Retrieve) -->
  <line x1="430" y1="280" x2="430" y2="160" stroke="#ff6b35" strokeWidth="2" markerEnd="url(#arrowhead)" />
  <text x="330" y="225" fontSize="9" fill="#ff6b35">Retrieve Data</text>
  
  <!-- Backend to Browser (Response) -->
  <line x1="400" y1="140" x2="320" y2="110" stroke="#ff6b35" strokeWidth="2" markerEnd="url(#arrowhead)" />
  <text x="340" y="120" fontSize="9" fill="#ff6b35">Send Timeline</text>
  
  <!-- Browser to User (Display) -->
  <line x1="180" y1="110" x2="120" y2="110" stroke="#ff6b35" strokeWidth="2" markerEnd="url(#arrowhead)" />
  <text x="135" y="125" fontSize="9" fill="#ff6b35">Display</text>
  
  <!-- Features section -->
  <rect x="20" y="350" width="320" height="220" fill="#1e293b" stroke="#64748b" strokeWidth="1" rx="5"/>
  <text x="180" y="375" fontSize="12" fontWeight="bold" fill="#ff6b35" textAnchor="middle">Key Features:</text>
  
  <text x="30" y="405" fontSize="11" fontWeight="bold" fill="#94a3b8">✓ Email Parsing</text>
  <text x="40" y="422" fontSize="10" fill="#64748b">AI extracts flights, hotels, activities</text>
  
  <text x="30" y="450" fontSize="11" fontWeight="bold" fill="#94a3b8">✓ Real-time Processing</text>
  <text x="40" y="467" fontSize="10" fill="#64748b">Instant data organization</text>
  
  <text x="30" y="495" fontSize="11" fontWeight="bold" fill="#94a3b8">✓ Secure Storage</text>
  <text x="40" y="512" fontSize="10" fill="#64748b">Encrypted, backed up, IAM protected</text>
  
  <text x="30" y="540" fontSize="11" fontWeight="bold" fill="#94a3b8">✓ Multi-Device Access</text>
  <text x="40" y="557" fontSize="10" fill="#64748b">Responsive web app</text>
</svg>
