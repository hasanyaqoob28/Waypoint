<svg viewBox="0 0 1200 800" xmlns="http://www.w3.org/2000/svg">
  <!-- Define styles -->
  <defs>
    <style>
      .title { font-size: 28px; font-weight: bold; fill: #1a1a1a; }
      .layer-label { font-size: 12px; fill: #666; font-weight: bold; letter-spacing: 1px; }
      .box-title { font-size: 16px; font-weight: bold; fill: #fff; }
      .box-text { font-size: 13px; fill: #fff; }
      .box-vercel { fill: #000; stroke: #0070f3; stroke-width: 2; }
      .box-aws { fill: #ff9900; stroke: #ff9900; stroke-width: 2; }
      .box-ai { fill: #8b5cf6; stroke: #8b5cf6; stroke-width: 2; }
      .box-api { fill: #3b82f6; stroke: #3b82f6; stroke-width: 2; }
      .box-external { fill: #6b7280; stroke: #6b7280; stroke-width: 2; }
      .arrow { stroke: #333; stroke-width: 2; fill: none; marker-end: url(#arrowhead); }
      .arrow-label { font-size: 11px; fill: #333; }
      .divider { stroke: #e5e7eb; stroke-width: 1; stroke-dasharray: 5,5; }
    </style>
    <marker id="arrowhead" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <polygon points="0 0, 10 3, 0 6" fill="#333" />
    </marker>
  </defs>

  <!-- Title -->
  <text x="600" y="40" text-anchor="middle" class="title">Travelway Architecture - AWS Well-Architected</text>

  <!-- LAYER 1: Client -->
  <text x="50" y="90" class="layer-label">CLIENT TIER</text>
  <rect x="80" y="110" width="150" height="60" rx="5" fill="#e5e7eb" stroke="#333" stroke-width="2"/>
  <text x="155" y="145" text-anchor="middle" class="box-text" fill="#333" font-weight="bold">USER BROWSER</text>

  <!-- Arrow down -->
  <path d="M 155 170 L 155 220" class="arrow"/>

  <!-- LAYER 2: Frontend - Vercel -->
  <text x="50" y="230" class="layer-label">FRONTEND TIER - VERCEL</text>
  <rect x="30" y="250" width="250" height="100" rx="5" class="box-vercel"/>
  <text x="155" y="275" text-anchor="middle" class="box-title">TRAVELWAY FRONTEND</text>
  <text x="155" y="295" text-anchor="middle" class="box-text" font-size="12">Next.js React Application</text>
  <text x="155" y="315" text-anchor="middle" class="box-text" font-size="11">• Booking Input Form</text>
  <text x="155" y="330" text-anchor="middle" class="box-text" font-size="11">• Event Timeline + Guidance</text>

  <!-- Arrow right to API -->
  <path d="M 280 300 L 450 300" class="arrow"/>
  <text x="360" y="290" class="arrow-label">API Calls</text>

  <!-- LAYER 3: Backend - API -->
  <text x="450" y="230" class="layer-label">BACKEND TIER - NEXT.JS</text>
  <rect x="450" y="250" width="220" height="100" rx="5" class="box-api"/>
  <text x="560" y="275" text-anchor="middle" class="box-title">NEXT.JS API ROUTES</text>
  <text x="560" y="295" text-anchor="middle" class="box-text" font-size="12">POST /api/parse</text>
  <text x="560" y="315" text-anchor="middle" class="box-text" font-size="12">GET /api/trips</text>
  <text x="560" y="330" text-anchor="middle" class="box-text" font-size="11">(Serverless Functions)</text>

  <!-- Arrow right to AI -->
  <path d="M 670 300 L 800 300" class="arrow"/>
  <text x="725" y="290" class="arrow-label">Send Text</text>

  <!-- AI - Google Gemini -->
  <text x="800" y="230" class="layer-label">AI PROCESSING</text>
  <rect x="800" y="250" width="200" height="100" rx="5" class="box-ai"/>
  <text x="900" y="275" text-anchor="middle" class="box-title">GOOGLE GEMINI</text>
  <text x="900" y="295" text-anchor="middle" class="box-text" font-size="12">Text Parsing Engine</text>
  <text x="900" y="315" text-anchor="middle" class="box-text" font-size="11">Vercel AI SDK</text>
  <text x="900" y="330" text-anchor="middle" class="box-text" font-size="10">via Vercel Gateway</text>

  <!-- Arrow down from API -->
  <path d="M 560 350 L 560 420" class="arrow"/>
  <text x="575" y="390" class="arrow-label">Store Data</text>

  <!-- LAYER 4: Database - Aurora PostgreSQL -->
  <text x="50" y="420" class="layer-label">DATA TIER - AWS AURORA POSTGRESQL</text>
  <!-- Database cylinder -->
  <ellipse cx="560" cy="440" rx="80" ry="15" fill="#ff9900" stroke="#ff9900" stroke-width="2"/>
  <rect x="480" y="440" width="160" height="70" fill="#ff9900" stroke="#ff9900" stroke-width="2"/>
  <ellipse cx="560" cy="510" rx="80" ry="15" fill="#cc7a00" stroke="#ff9900" stroke-width="2"/>
  
  <text x="560" y="460" text-anchor="middle" class="box-title" font-size="14">AURORA DATABASE</text>
  <text x="560" y="480" text-anchor="middle" class="box-text" font-size="11">USERS | TRIPS | EVENTS</text>

  <!-- Arrow back up to Frontend -->
  <path d="M 480 480 L 280 300" class="arrow" stroke-dasharray="5,5"/>
  <text x="340" y="370" class="arrow-label">Retrieve Trips</text>

  <!-- Arrow down from Gemini to Database -->
  <path d="M 900 350 L 900 400 L 640 450" class="arrow"/>
  <text x="910" y="410" class="arrow-label">Parsed Events</text>

  <!-- EXTERNAL SERVICES -->
  <text x="50" y="620" class="layer-label">EXTERNAL SERVICES</text>
  
  <!-- Weather API -->
  <rect x="80" y="640" width="180" height="80" rx="5" class="box-external"/>
  <text x="170" y="670" text-anchor="middle" class="box-title">OPEN-METEO API</text>
  <text x="170" y="690" text-anchor="middle" class="box-text" font-size="12">Weather Data</text>
  <text x="170" y="710" text-anchor="middle" class="box-text" font-size="11">Real-time Conditions</text>

  <!-- Arrow from Weather to Frontend -->
  <path d="M 170 640 L 155 350" class="arrow" stroke-dasharray="5,5"/>
  <text x="120" y="490" class="arrow-label">Weather Data</text>

  <!-- DATA FLOW ANNOTATIONS -->
  <text x="50" y="760" font-size="14" font-weight="bold" fill="#1a1a1a">DATA FLOW:</text>
  <text x="50" y="785" font-size="12" fill="#333">1. User pastes booking → 2. API parses with Gemini → 3. Stores in Aurora → 4. Retrieves and displays → 5. Weather overlay</text>
</svg>
